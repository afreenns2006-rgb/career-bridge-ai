title = "Career Bridge AI gitleaks configuration"

[extend]
useDefault = true

[[allowlists]]
description = "Documentation and example environment placeholders"
paths = [
  '''README\.md''',
  '''USER_MANUAL\.md''',
  '''CONTRIBUTING\.md''',
  '''CHANGELOG\.md''',
  '''\.env\.example''',
]
regexes = [
  '''(?i)change-me''',
  '''(?i)example''',
  '''(?i)your[-_ ]?(api|secret|token|password)''',
]

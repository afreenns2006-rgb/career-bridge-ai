name: Code Quality

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install ruff mypy bandit flake8 pylint vulture pyupgrade

      - run: ruff check . || true
      - run: mypy . || true
      - run: bandit -r . || true
      - run: flake8 . || true
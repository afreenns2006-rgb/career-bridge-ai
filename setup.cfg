[flake8]
max-line-length = 120
extend-ignore = E203,W503,E501,W293,E302,E305,F401,F541,F841
exclude =
    .git,
    .venv,
    __pycache__,
    uploads,
    logs,
    models

[coverage:run]
branch = True
source = .
omit =
    .venv/*
    tests/*
    uploads/*
    logs/*
    models/*

[coverage:report]
fail_under = 1
show_missing = True
skip_empty = True

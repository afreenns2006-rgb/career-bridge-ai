stages:
  - lint
  - format
  - type_check
  - test
  - security
  - quality

gitleaks_scan:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --verbose

pip_audit:
  stage: security
  image: python:3.11
  before_script:
    - pip install pip-audit
  script:
    - pip-audit

bandit_scan:
  stage: security
  image: python:3.11
  before_script:
    - pip install bandit
  script:
    - bandit -r .

test:
  stage: test
  image: python:3.11
  before_script:
    - pip install pytest pytest-cov coverage
  script:
    - pytest tests --cov=. --cov-report=term-missing --cov-fail-under=70
  coverage: '/TOTAL.*\s+(\d+%)/'

pre_commit:
  stage: quality
  image: python:3.11
  before_script:
    - pip install pre-commit
  script:
    - pre-commit run --all-files

git_cliff:
  stage: quality
  image: rust:latest
  script:
    - cargo install git-cliff || true
    - git-cliff --version

lint:
  stage: lint
  image: python:3.11
  before_script:
    - pip install ruff
  script:
    - ruff check .

format:
  stage: format
  image: python:3.11
  before_script:
    - pip install black
  script:
    - black --check .

type_check:
  stage: type_check
  image: python:3.11
  before_script:
    - pip install mypy
  script:
    - mypy .


stages:
  - quality
  - security
  - test
  - release

default:
  image: python:3.11-slim
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .cache/pip
  before_script:
    - python --version
    - python -m pip install --upgrade pip
    - python -m pip install -r requirements-dev.txt

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

ruff:
  stage: quality
  script:
    - ruff check .
    - ruff format --check .

mypy:
  stage: quality
  script:
    - mypy

flake8:
  stage: quality
  script:
    - flake8 .

pylint:
  stage: quality
  script:
    - pylint --fail-under=0 app.py career_engine.py config.py database.py opportunity_engine.py resume_parser.py roadmap_engine.py scheme_engine.py scholarship_engine.py

vulture:
  stage: quality
  script:
    - vulture .

pyupgrade:
  stage: quality
  script:
    - pyupgrade --py39-plus $(git ls-files '*.py')
    - git diff --exit-code

bandit:
  stage: security
  script:
    - bandit -c pyproject.toml -r .

semgrep:
  stage: security
  script:
    - semgrep --config .semgrep.yml --error

pip_audit:
  stage: security
  script:
    - pip-audit -r requirements.txt -r requirements-dev.txt --ignore-vuln GHSA-rrmf-rvhw-rf47 --ignore-vuln PYSEC-2025-217 --ignore-vuln GHSA-69w3-r845-3855

gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:v8.22.0
    entrypoint: [""]
  before_script: []
  script:
    - gitleaks detect --source . --config .gitleaks.toml --verbose

pytest:
  stage: test
  script:
    - pytest
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
      - htmlcov/

changelog_preview:
  stage: release
  image:
    name: orhunp/git-cliff:latest
    entrypoint: [""]
  before_script: []
  script:
    - git-cliff --unreleased --strip header
  rules:
    - if: '$CI_COMMIT_BRANCH'
